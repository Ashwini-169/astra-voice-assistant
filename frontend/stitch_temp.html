<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .orb-gradient {
            background: radial-gradient(circle at 30% 30%, #99f7ff 0%, #ac8aff 45%, #ec63ff 100%);
        }
        .energy-halo {
            background: radial-gradient(circle, rgba(153, 247, 255, 0.1) 0%, rgba(236, 99, 255, 0.05) 50%, transparent 70%);
        }
        .glass-panel {
            background: rgba(44, 44, 45, 0.4);
            backdrop-filter: blur(20px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Animated Background Waves */
        .wave-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            opacity: 0.3;
        }
        .wave {
            position: absolute;
            left: -100%;
            width: 300%;
            height: 100%;
            background-repeat: repeat-x;
            transform-origin: center bottom;
        }
        .wave-1 {
            animation: move-wave 20s linear infinite;
            opacity: 0.2;
        }
        .wave-2 {
            animation: move-wave 15s linear infinite reverse;
            opacity: 0.15;
            top: 5%;
        }
        @keyframes move-wave {
            0% { transform: translateX(0) translateZ(0) scaleY(1); }
            50% { transform: translateX(25%) translateZ(0) scaleY(0.8); }
            100% { transform: translateX(50%) translateZ(0) scaleY(1); }
        }

        /* Speaking Mouth Animation */
        .orb-mouth {
            width: 24px;
            height: 4px;
            background: #99f7ff;
            border-radius: 99px;
            box-shadow: 0 0-10px #00f1fe;
            transition: all 0.2s ease;
        }
        /* Only pulse when "speaking" or active */
        .is-speaking .orb-mouth {
            animation: speaking 0.4s ease-in-out infinite alternate;
        }
        @keyframes speaking {
            from { height: 2px; width: 12px; opacity: 0.6; }
            to { height: 8px; width: 16px; opacity: 1; border-radius: 4px; }
        }
    
        /* Blink Animation */
        @keyframes eye-blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0); }
        }
        .animate-blink {
            animation: eye-blink 4s infinite;
        }

        /* Cheerful Particles */
        @keyframes particle-float {
            0% { transform: translateY(0) scale(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-100px) scale(1.5) rotate(45deg); opacity: 0; }
        }
        .cheerful-particle {
            position: absolute;
            pointer-events: none;
            animation: particle-float 3s ease-out infinite;
        }

        /* Astra Perspective Rotation */
        #astra-container {
            transition: transform 0.1s ease-out;
            perspective: 1000px;
        }
        #astra-orb {
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }
        #astra-face {
            transition: transform 0.1s ease-out;
        }

        /* Listening State Waves Overlay (Moved to bottom) */
        #listening-canvas {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            pointer-events: none;
            width: 100vw;

<script>
        // Canvas Waveform Logic (Bottom Decorative Waves)
        const canvas = document.getElementById('waveformCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Wave {
            constructor(frequency, amplitude, speed, opacity, offset, color) {
                this.frequency = frequency;
                this.amplitude = amplitude;
                this.speed = speed;
                this.opacity = opacity;
                this.offset = offset;
                this.color = color || '99, 102, 241';
                this.phase = 0;
            }
            draw(context, canvasWidth, canvasHeight, anchorFactor = 1, isCentered = false) {
                context.beginPath();
                context.lineWidth = 1.5;
                context.strokeStyle = `rgba(${this.color}, ${this.opacity})`;
                for (let x = 0; x <= canvasWidth; x += 2) {
                    const normalizedX = (x / canvasWidth) * 2 - 1;
                    
                    // Anchoring logic: if centered, active in middle, flat at sides. 
                    // If isCentered is true, we use cos^2 for peak in middle.
                    const anchoring = isCentered ? Math.pow(Math.cos(normalizedX * Math.PI / 2), 4) : Math.pow(Math.cos(normalizedX * Math.PI / 2), anchorFactor);
                    
                    const y = (canvasHeight / 2) + 
                              (Math.sin(x * this.frequency + this.phase + this.offset) * this.amplitude * anchoring) - 
                              (Math.cos(x * this.frequency * 0.5 + this.phase) * (this.amplitude * 0.5) * anchoring);
                    if (x === 0) context.moveTo(x, y);
                    else context.lineTo(x, y);
                }
                context.stroke();
                this.phase += this.speed;
            }
        }

        const bottomWaves = [
            new Wave(0.005, 60, 0.02, 0.3, 0),
            new Wave(0.008, 40, -0.015, 0.15, Math.PI / 4),
            new Wave(0.012, 25, 0.03, 0.1, Math.PI / 2)
        ];

        // Listening Canvas Logic (Bottom interactive Waves)
        const listeningCanvas = document.getElementById('listening-canvas');
        const lCtx = listeningCanvas.getContext('2d');
        function resizeListening() {
            listeningCanvas.width = window.innerWidth;
            listeningCanvas.height = 240;
        }
        window.addEventListener('resize', resizeListening);
        resizeListening();

        const synthWaves = [
            new Wave(0.01, 70, 0.05, 0.6, 0, '153, 247, 255'), // Primary Cyan
            new Wave(0.015, 55, 0.04, 0.4, Math.PI/3, '172, 138, 255'), // Secondary Purple
            new Wave(0.008, 80, 0.03, 0.3, Math.PI/1.5, '236, 99, 255'), // Tertiary Pink
            new Wave(0.02, 45, 0.06, 0.2, Math.PI, '0, 241, 254') // Primary Container
        ];

        // Toggle state for demonstration
        let isSpeaking = false;
        const micBtn = document.getElementById('mic-trigger');
        const astraContainer = document.getElementById('astra-container');
        
        micBtn.addEventListener('click', () => {
            isSpeaking = !isSpeaking;
            if(isSpeaking) astraContainer.classList.add('is-speaking');
            else astraContainer.classList.remove('is-speaking');
        });

        // Cursor Tracking Logic
        const orb = document.getElementById('astra-orb');
        const container = document.getElementById('astra-container');
        const face = document.getElementById('astra-face');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function updateAstraGaze() {
            const rect = container.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const deltaX = (mouseX - centerX) / window.innerWidth;
            const deltaY = (mouseY - centerY) / window.innerHeight;
            
            // Rotate the whole container slightly for depth
            container.style.transform = `rotateY(${deltaX * 15}deg) rotateX(${-deltaY * 15}deg)`;
            
            // Move the face more for the "gazing" effect
            face.style.transform = `translateX(${deltaX * 40}px) translateY(${deltaY * 40}px)`;
            
            // Subtle shadow shift
            orb.style.boxShadow = `${-deltaX * 30}px ${-deltaY * 30}px 80px rgba(153,247,255,0.2)`;
        }

        function animate() {
            // Background decor waves
            ctx.clearRect(0, 0, width, height);
            bottomWaves.forEach(wave => {
                ctx.save();
                ctx.translate(0, height - 40);
                wave.draw(ctx, width, 80, 0.5);
                ctx.restore();
            });

            // Bottom Interactive Visualizer Waves (Horizontal around Mic)
            lCtx.clearRect(0, 0, listeningCanvas.width, listeningCanvas.height);
            synthWaves.forEach(wave => {
                // If speaking, boost amplitude
                const targetAmp = isSpeaking ? wave.amplitude * 1.5 : wave.amplitude;
                const currentAmp = wave.currentAmplitude || targetAmp;
                wave.currentAmplitude = currentAmp + (targetAmp - currentAmp) * 0.1;
                
                const tempWave = {...wave, amplitude: wave.currentAmplitude};
                
                lCtx.save();
                // Position at the bottom of the canvas, which is at the bottom of the screen
                lCtx.translate(0, listeningCanvas.height - 80); 
                // Draw as centered visualizer
                drawCenteredWave(lCtx, listeningCanvas.width, 160, tempWave);
                lCtx.restore();
                
                wave.phase += wave.speed;
            });

            updateAstraGaze();
            requestAnimationFrame(animate);
        }

        function drawCenteredWave(context, canvasWidth, canvasHeight, wave) {
            context.beginPath();
            context.lineWidth = 2;
            context.strokeStyle = `rgba(${wave.color}, ${wave.opacity})`;
            
            for (let x = 0; x <= canvasWidth; x += 4) {
                const normalizedX = (x / canvasWidth) * 2 - 1; 
                // Bell curve anchoring - focused in center
                const anchoring = Math.pow(Math.cos(normalizedX * Math.PI / 2), 6);
                
                const y = (canvasHeight / 2) + 
                          (Math.sin(x * wave.frequency + wave.phase + wave.offset) * wave.amplitude * anchoring) +
                          (Math.cos(x * wave.frequency * 0.7 + wave.phase) * (wave.amplitude * 0.4) * anchoring);
                
                if (x === 0) context.moveTo(x, y);
                else context.lineTo(x, y);
            }
            context.stroke();
        }

        animate();
    </script>
</body></html>
